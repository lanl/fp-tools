# --------- Input Section ---------
[input]
    file            = "dump-prod-other.xyz"    # Path to trajectory file
    #file = "binary-system.xyz"
    #vel_file = ""
    #end_frame       =              # Last frame (inclusive)  

[output]
    path            = "gr-fixed-other"          # Directory to save output files

[properties]
    dt = 0.001                     # Timestep between consecutive frames
    #box_lengths = [12.896, 12.896, 12.896]

# --------- Analysis Configuration ---------
[analysis]
  
  #---- Mean Squared Displacement (MSD) ----
  [analysis.msd]
    enabled     = false        
    max_lag     = 10000
    groups      = [["1", "2"], ["1", "1"], ["2", "2"]]
    # plot_format = ""

    # Optional: Choose how many figures to output as well as what curves go on them
    # curves = [
    #   [  # Plot 1
    #     { types = ["1"], label = "1" },
    #     { types = ["2"], label = "2" },
    #     { types = ["3"], label = "3" },
    #   ]
    # ]

  # ---- Radial Distribution Function (RDF) ----
  [analysis.rdf]
    enabled     = true
    dr          = 0.03
    # LAMMPS : dr          = 0.00449645
    r_max       = 6.0
    pairs       = ["all"]
    # plot_format = "png"

    # curves = [
    #     [  # Plot 1
    #         { types = ["1", "2"], label = "1-2" },
    #     ],
    #     [  # Plot 2
    #         # { types = ["1", "2"], label = "1-2" }
    #     ]
    # ]

  # ---- Mean First Passage Time (MFPT) / D(r) ----
  [analysis.mfpt]
    enabled = false
    dt = 0.005
    dr = 0.03
    r_max = 3.5
    species = ["1", "2", "all"]
    #plot_dofr = true
    #plot_format = ""
  #
  # ---- Correlation Functions ----
  [analysis.correlations]
    enabled = false
    dt = 0.1
    normalize = true
    
    # Built-in correlation functions
    builtin = ["dsf", "curr"]
    # mode = "spherical-grid"
    #n = [1.199241, 0, 0]
    n_list = "n_list.dat"

    # Generic pairwise correlations
    # custom = [
    #   { name = "sine_corr", files = ["sine_wave.dat"], columns = [2] },
    # ]
